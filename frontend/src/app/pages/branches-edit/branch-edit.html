<main class="branch-edit-page">
  <header class="branch-edit-header">
    <div>
      <span class="branch-edit-eyebrow">RegulaTrack</span>
      <h1>Edit Branch</h1>
      <p>Update operational unit information.</p>
    </div>
  </header>

  <section class="edit-toolbar">
    <div>
      <strong>Editing branch</strong>
      <span>Update the fields below and save your changes.</span>
    </div>

    <a [routerLink]="['/branches', branchId]" class="edit-toolbar-action">
      Back to Details
    </a>
  </section>

  @if (loading) {
  <p class="branch-edit-state">Loading branch data...</p>
  }

  @if (errorMessage) {
  <p class="form-error">{{ errorMessage }}</p>
  }

  @if (!loading && !errorMessage) {
  <section class="form-card">
    <form (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-field">
          <label for="companyId">Company</label>
          <select id="companyId" name="companyId" required [(ngModel)]="form.companyId">
            <option [ngValue]="null">Select a company</option>

            @if (companies$ | async; as companies) {
            @for (company of companies; track company.id) {
            <option [ngValue]="company.id">{{ company.name }}</option>
            }
            }
          </select>
        </div>

        <div class="form-field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required [(ngModel)]="form.name" />
        </div>

        <div class="form-field full">
          <label for="address">Address</label>
          <input id="address" name="address" type="text" [(ngModel)]="form.address" />
        </div>

        <div class="form-field">
          <label for="city">City</label>
          <input id="city" name="city" type="text" [(ngModel)]="form.city" />
        </div>

        <div class="form-field">
          <label for="state">State</label>
          <input id="state" name="state" type="text" [(ngModel)]="form.state" />
        </div>

        <div class="form-field">
          <label for="country">Country</label>
          <input id="country" name="country" type="text" [(ngModel)]="form.country" />
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>

        <a [routerLink]="['/branches', branchId]" class="cancel-link">Cancel</a>
      </div>
    </form>
  </section>
  }
</main>
